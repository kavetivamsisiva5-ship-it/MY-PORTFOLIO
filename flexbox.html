<!DOCTYPE html>
<html lang="en">
<head>
<style>
    body {
        backgroundcolour:#2f3b46;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }
    .container {
        display:flex;
        flex-wrap:wrap;
        width:400px;
        height:400px;
        padding:10px;
        background-color:white;
        gap:10px;
    }
    .box {
        background-color:rgb(18, 145, 18);
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        width:calc(50% - 10px);
        height:calc(50% - 10px);
    }
</style>
    
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="box">Child 1</div>
        <div class="box">Child 2</div>
        <div class="box">Child 3</div>    
        <div class="box">Child 4</div>
    </div>  
</body>
</html>
